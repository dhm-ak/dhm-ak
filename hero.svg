<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,'Cascadia Mono','JetBrains Mono','Courier New',monospace" role="img" aria-label="Attila Kondor, dhm-ak. Blueprint title sheet A-000.">
  <style>
    .dr{stroke-dasharray:100;stroke-dashoffset:100;animation:dr 1.6s cubic-bezier(.6,0,.3,1) forwards}
    .t{opacity:0;animation:ft .9s ease forwards}
    @keyframes dr{to{stroke-dashoffset:0}}
    @keyframes ft{to{opacity:1}}
    .s1{animation-delay:.15s}.s2{animation-delay:.35s}.s3{animation-delay:.55s}
    .s4{animation-delay:.75s}.s5{animation-delay:.95s}.s6{animation-delay:1.15s}
    .s7{animation-delay:1.35s}.s8{animation-delay:1.6s}.s9{animation-delay:1.85s}
    @media (prefers-reduced-motion: reduce){
      .dr,.t{animation:none}
      .dr{stroke-dashoffset:0}
      .t{opacity:1}
    }
  </style>

  <defs>
    <pattern id="gridS" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#8ECAE6" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="gridL" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#8ECAE6" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="1200" height="420" fill="#0E2439"/>
  <rect width="1200" height="420" fill="url(#gridS)"/>
  <rect width="1200" height="420" fill="url(#gridL)"/>

  <!-- drawing frame -->
  <rect x="14" y="14" width="1172" height="392" fill="none" stroke="#9FC9E8" stroke-width="2" pathLength="100" class="dr"/>
  <rect x="24" y="24" width="1152" height="372" fill="none" stroke="#9FC9E8" stroke-width="0.8" opacity="0.55" pathLength="100" class="dr s1"/>

  <!-- register crosshairs -->
  <g stroke="#7FA8C7" stroke-width="1" opacity="0.8" class="t s2">
    <path d="M44 44h12M50 38v12"/>
    <path d="M1144 44h12M1150 38v12"/>
    <path d="M44 376h12M50 370v12"/>
    <path d="M1144 376h12M1150 370v12"/>
  </g>

  <!-- ============ LEFT : NAME BLOCK ============ -->
  <text x="64" y="98" font-size="13" letter-spacing="3" fill="#7FA8C7" class="t s3">PROJECT NO. 001 &#183; PROFILE DRAWING SET &#183; ISSUED FOR CONSTRUCTION</text>

  <text x="61" y="164" font-size="57" font-weight="700" letter-spacing="7" fill="#EAF4FB" class="t s4">ATTILA KONDOR</text>
  <line x1="64" y1="186" x2="700" y2="186" stroke="#9FC9E8" stroke-width="1.5" pathLength="100" class="dr s4"/>

  <text x="64" y="222" font-size="17" letter-spacing="1" fill="#C8E0F2" class="t s5">dhm-ak &#183; the hague, nl</text>
  <text x="64" y="254" font-size="14" letter-spacing="2" fill="#9FC9E8" class="t s6">SECURITY STUDIES @ LEIDEN &#183; AI GOVERNANCE &#183; SYSTEMS &amp; SOUND</text>
  <text x="64" y="292" font-size="12" letter-spacing="2" fill="#7FA8C7" class="t s7">34 REPOSITORIES &#183; DRAFTING SINCE 2023 &#183; PYTHON / TS / C++</text>

  <!-- ============ RIGHT : ELEVATION ============ -->
  <g stroke="#9FC9E8" fill="none" stroke-width="1.6">
    <!-- ground -->
    <line x1="756" y1="312" x2="1148" y2="312" stroke-width="2" pathLength="100" class="dr s3"/>
    <!-- earth ticks -->
    <g stroke-width="1" opacity="0.6" class="t s7">
      <path d="M766 312l-7 8M790 312l-7 8M814 312l-7 8M838 312l-7 8M862 312l-7 8M1076 312l-7 8M1100 312l-7 8M1124 312l-7 8M1148 312l-7 8"/>
    </g>
    <!-- facade shell -->
    <path d="M804 312V166" stroke-width="2" pathLength="100" class="dr s4"/>
    <path d="M1076 312V166" stroke-width="2" pathLength="100" class="dr s4"/>
    <!-- cornice, broken at pediment -->
    <path d="M798 158H914M966 158H1082" stroke-width="2" pathLength="100" class="dr s4"/>
    <path d="M804 166H876M1004 166H1076" stroke-width="1" pathLength="100" class="dr s5"/>
    <!-- string courses -->
    <path d="M804 202H876M1004 202H1076" stroke-width="1" opacity="0.8" pathLength="100" class="dr s5"/>
    <line x1="804" y1="264" x2="1076" y2="264" stroke-width="1.2" pathLength="100" class="dr s5"/>
    <!-- rusticated base, side bays -->
    <g stroke-width="0.9" opacity="0.7" pathLength="100">
      <line x1="804" y1="276" x2="876" y2="276" class="dr s5"/>
      <line x1="804" y1="288" x2="876" y2="288" class="dr s5"/>
      <line x1="804" y1="300" x2="876" y2="300" class="dr s5"/>
      <line x1="1004" y1="276" x2="1076" y2="276" class="dr s5"/>
      <line x1="1004" y1="288" x2="1076" y2="288" class="dr s5"/>
      <line x1="1004" y1="300" x2="1076" y2="300" class="dr s5"/>
    </g>
    <!-- portico columns -->
    <g stroke-width="1.4" pathLength="100">
      <line x1="895" y1="298" x2="895" y2="209" class="dr s5"/><line x1="901" y1="298" x2="901" y2="209" class="dr s5"/>
      <line x1="923" y1="298" x2="923" y2="209" class="dr s5"/><line x1="929" y1="298" x2="929" y2="209" class="dr s5"/>
      <line x1="951" y1="298" x2="951" y2="209" class="dr s6"/><line x1="957" y1="298" x2="957" y2="209" class="dr s6"/>
      <line x1="979" y1="298" x2="979" y2="209" class="dr s6"/><line x1="985" y1="298" x2="985" y2="209" class="dr s6"/>
    </g>
    <!-- capitals + bases -->
    <g stroke-width="1.1" pathLength="100" class="dr s6">
      <path d="M892 209h12M892 205h12M920 209h12M920 205h12M948 209h12M948 205h12M976 209h12M976 205h12"/>
      <path d="M892 293h12M892 298h12M920 293h12M920 298h12M948 293h12M948 298h12M976 293h12M976 298h12"/>
    </g>
    <!-- entablature + pediment -->
    <line x1="876" y1="205" x2="1004" y2="205" stroke-width="1.2" pathLength="100" class="dr s6"/>
    <line x1="876" y1="196" x2="1004" y2="196" stroke-width="1.4" pathLength="100" class="dr s6"/>
    <path d="M876 196L940 132L1004 196" stroke-width="1.8" pathLength="100" class="dr s6"/>
    <path d="M886 193L940 139L994 193" stroke-width="0.9" opacity="0.6" pathLength="100" class="dr s7"/>
    <circle cx="940" cy="172" r="8" stroke-width="1.2" pathLength="100" class="dr s7"/>
    <!-- door + fanlight -->
    <g stroke-width="1.3" pathLength="100" class="dr s7">
      <line x1="930" y1="298" x2="930" y2="254"/>
      <line x1="950" y1="298" x2="950" y2="254"/>
      <line x1="926" y1="254" x2="954" y2="254"/>
      <path d="M930 254A10 10 0 0 1 950 254"/>
    </g>
    <!-- portico floor + steps -->
    <line x1="876" y1="298" x2="1004" y2="298" stroke-width="1.4" pathLength="100" class="dr s6"/>
    <g stroke-width="1.2" pathLength="100" class="dr s7">
      <line x1="862" y1="305" x2="1018" y2="305"/>
      <path d="M862 305v7M1018 305v7M876 298v7M1004 298v7"/>
    </g>
    <!-- piano nobile windows -->
    <g stroke-width="1.2" pathLength="100">
      <rect x="816" y="214" width="20" height="44" class="dr s6"/>
      <rect x="848" y="214" width="20" height="44" class="dr s6"/>
      <rect x="1012" y="214" width="20" height="44" class="dr s6"/>
      <rect x="1044" y="214" width="20" height="44" class="dr s6"/>
    </g>
    <g stroke-width="0.8" opacity="0.75" pathLength="100" class="dr s7">
      <path d="M826 214v44M816 236h20M858 214v44M848 236h20M1022 214v44M1012 236h20M1054 214v44M1044 236h20"/>
    </g>
    <g stroke-width="1" pathLength="100" class="dr s7">
      <path d="M813 214L826 207L839 214M845 214L858 207L871 214M1009 214L1022 207L1035 214M1041 214L1054 207L1067 214"/>
      <path d="M813 260h26M845 260h26M1009 260h26M1041 260h26"/>
    </g>
    <!-- upper floor windows -->
    <g stroke-width="1.1" pathLength="100">
      <rect x="816" y="172" width="20" height="20" class="dr s7"/>
      <rect x="848" y="172" width="20" height="20" class="dr s7"/>
      <rect x="1012" y="172" width="20" height="20" class="dr s7"/>
      <rect x="1044" y="172" width="20" height="20" class="dr s7"/>
    </g>
    <g stroke-width="0.8" opacity="0.75" pathLength="100" class="dr s7">
      <path d="M826 172v20M858 172v20M1022 172v20M1054 172v20"/>
    </g>
    <!-- balustrade, interrupted by pediment -->
    <g stroke-width="1.2" pathLength="100" class="dr s7">
      <line x1="812" y1="142" x2="872" y2="142"/>
      <line x1="1008" y1="142" x2="1068" y2="142"/>
      <path d="M812 142v16M872 142v16M1008 142v16M1068 142v16"/>
    </g>
    <g stroke-width="0.9" opacity="0.8" pathLength="100" class="dr s7">
      <path d="M822 146v12M834 146v12M846 146v12M858 146v12M1018 146v12M1030 146v12M1042 146v12M1054 146v12"/>
    </g>
    <!-- chimney stacks -->
    <g stroke-width="1.3" pathLength="100" class="dr s7">
      <path d="M826 142V118h16v24"/>
      <line x1="824" y1="123" x2="844" y2="123"/>
      <path d="M1038 142V118h16v24"/>
      <line x1="1036" y1="123" x2="1056" y2="123"/>
    </g>
    <!-- tree -->
    <g stroke-width="1.2" pathLength="100" class="dr s8">
      <circle cx="776" cy="282" r="15"/>
      <circle cx="766" cy="293" r="9"/>
      <line x1="776" y1="297" x2="776" y2="312"/>
    </g>
    <!-- height dimension -->
    <g stroke-width="1" opacity="0.9">
      <line x1="1082" y1="158" x2="1112" y2="158" pathLength="100" class="dr s7"/>
      <line x1="1104" y1="158" x2="1104" y2="312" pathLength="100" class="dr s7"/>
      <path d="M1099 163l10-10M1099 317l10-10" pathLength="100" class="dr s8"/>
    </g>
  </g>
  <text x="1120" y="235" font-size="11" letter-spacing="2" fill="#7FA8C7" transform="rotate(-90 1120 235)" text-anchor="middle" class="t s8">16 800</text>

  <!-- section cut A-A (accent) -->
  <g class="t s9">
    <line x1="940" y1="83" x2="940" y2="306" stroke="#EF6351" stroke-width="1.4" stroke-dasharray="14 5 3 5"/>
    <circle cx="940" cy="70" r="13" fill="#0E2439" stroke="#EF6351" stroke-width="1.6"/>
    <line x1="927" y1="70" x2="953" y2="70" stroke="#EF6351" stroke-width="1"/>
    <text x="940" y="66.5" font-size="9.5" font-weight="700" fill="#EF6351" text-anchor="middle">A</text>
    <text x="940" y="78.5" font-size="7.5" fill="#EF6351" text-anchor="middle">201</text>
    <circle cx="940" cy="318" r="12" fill="#0E2439" stroke="#EF6351" stroke-width="1.6"/>
    <line x1="928" y1="318" x2="952" y2="318" stroke="#EF6351" stroke-width="1"/>
    <text x="940" y="315" font-size="9" font-weight="700" fill="#EF6351" text-anchor="middle">A</text>
    <text x="940" y="326" font-size="7.5" fill="#EF6351" text-anchor="middle">201</text>
    <text x="958" y="322" font-size="9.5" letter-spacing="1" fill="#EF6351">SEE SECTION BELOW</text>
  </g>

  <!-- ============ TITLE BLOCK ============ -->
  <g class="t s8">
    <line x1="24" y1="338" x2="1176" y2="338" stroke="#9FC9E8" stroke-width="1.4"/>
    <g stroke="#9FC9E8" stroke-width="0.8" opacity="0.7">
      <line x1="330" y1="338" x2="330" y2="396"/>
      <line x1="540" y1="338" x2="540" y2="396"/>
      <line x1="760" y1="338" x2="760" y2="396"/>
      <line x1="880" y1="338" x2="880" y2="396"/>
      <line x1="1000" y1="338" x2="1000" y2="396"/>
    </g>
    <g font-size="9" letter-spacing="2" fill="#7FA8C7">
      <text x="40" y="356">PROJECT</text>
      <text x="346" y="356">DRAWN BY</text>
      <text x="556" y="356">LOCATION</text>
      <text x="776" y="356">SCALE</text>
      <text x="896" y="356">DATE</text>
      <text x="1016" y="356">SHEET NO.</text>
    </g>
    <g font-size="14" letter-spacing="1" fill="#EAF4FB">
      <text x="40" y="381">GITHUB PROFILE / DHM-AK</text>
      <text x="346" y="381">A. KONDOR</text>
      <text x="556" y="381">THE HAGUE, NL</text>
      <text x="776" y="381">NTS</text>
      <text x="896" y="381">2026</text>
      <text x="1016" y="381" font-weight="700">A-000</text>
    </g>
  </g>
</svg>
