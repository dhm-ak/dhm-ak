<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,'Cascadia Mono','JetBrains Mono','Courier New',monospace" role="img" aria-label="Section A-A: a building cross-section. Foundation: Leiden Security Studies and Abbey Road audio engineering. Floors: Harmonic Conservatory, Chord Architect, Operation Nexus, Score Analyser. Top level under construction with a tower crane.">
  <style>
    .dr{stroke-dasharray:100;stroke-dashoffset:100;animation:dr 1.5s cubic-bezier(.6,0,.3,1) forwards}
    .t{opacity:0;animation:ft .9s ease forwards}
    @keyframes dr{to{stroke-dashoffset:0}}
    @keyframes ft{to{opacity:1}}
    .s1{animation-delay:.15s}.s2{animation-delay:.35s}.s3{animation-delay:.55s}
    .s4{animation-delay:.8s}.s5{animation-delay:1.05s}.s6{animation-delay:1.3s}
    .s7{animation-delay:1.55s}.s8{animation-delay:1.8s}.s9{animation-delay:2.1s}
    .s10{animation-delay:2.4s}
    @media (prefers-reduced-motion: reduce){
      .dr,.t{animation:none}
      .dr{stroke-dashoffset:0}
      .t{opacity:1}
    }
  </style>

  <defs>
    <pattern id="gridS2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#8ECAE6" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="gridL2" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#8ECAE6" stroke-opacity="0.1" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#7FA8C7" stroke-width="1" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="1200" height="780" fill="#0E2439"/>
  <rect width="1200" height="780" fill="url(#gridS2)"/>
  <rect width="1200" height="780" fill="url(#gridL2)"/>

  <!-- frame -->
  <rect x="14" y="14" width="1172" height="752" fill="none" stroke="#9FC9E8" stroke-width="2" pathLength="100" class="dr"/>
  <rect x="24" y="24" width="1152" height="732" fill="none" stroke="#9FC9E8" stroke-width="0.8" opacity="0.55" pathLength="100" class="dr s1"/>

  <!-- header -->
  <text x="64" y="78" font-size="12" letter-spacing="3" fill="#7FA8C7" class="t s2">CUT LINE PER SHEET A-000 &#183; SCALE: NTS</text>
  <text x="62" y="126" font-size="42" font-weight="700" letter-spacing="6" fill="#EAF4FB" class="t s2">SECTION A-A</text>
  <text x="64" y="156" font-size="14" letter-spacing="2" fill="#9FC9E8" class="t s3">VERTICAL PROGRAM &#183; SELECTED WORKS &#183; BUILT FROM THE FOUNDATION UP</text>

  <!-- sheet ref box -->
  <g class="t s2">
    <rect x="1044" y="50" width="112" height="52" fill="none" stroke="#9FC9E8" stroke-width="1.4"/>
    <text x="1100" y="68" font-size="9" letter-spacing="2" fill="#7FA8C7" text-anchor="middle">SHEET NO.</text>
    <text x="1100" y="92" font-size="19" font-weight="700" letter-spacing="2" fill="#EAF4FB" text-anchor="middle">A-201</text>
  </g>

  <!-- ground line + earth hatch -->
  <line x1="90" y1="600" x2="1110" y2="600" stroke="#9FC9E8" stroke-width="2.2" pathLength="100" class="dr s3"/>
  <g class="t s4">
    <rect x="100" y="601" width="200" height="44" fill="url(#hatch)"/>
    <rect x="880" y="601" width="220" height="44" fill="url(#hatch)"/>
  </g>

  <!-- ================= FOUNDATION ================= -->
  <g stroke="#9FC9E8" fill="none">
    <rect x="320" y="600" width="540" height="88" stroke-width="2" pathLength="100" class="dr s4"/>
    <rect x="300" y="688" width="120" height="18" stroke-width="1.6" pathLength="100" class="dr s4"/>
    <rect x="760" y="688" width="120" height="18" stroke-width="1.6" pathLength="100" class="dr s4"/>
  </g>
  <text x="340" y="626" font-size="11" letter-spacing="3" fill="#7FA8C7" class="t s5">FOUNDATION</text>
  <text x="840" y="626" font-size="11" letter-spacing="1" fill="#7FA8C7" text-anchor="end" class="t s5">EST. COMPL. 2028</text>
  <text x="340" y="652" font-size="15" letter-spacing="0.5" fill="#EAF4FB" class="t s5">BSc SECURITY STUDIES &#183; LEIDEN UNIVERSITY, THE HAGUE</text>
  <text x="340" y="674" font-size="12.5" letter-spacing="0.5" fill="#9FC9E8" class="t s5">ADV. DIPLOMA, SOUND ENGINEERING &#183; ABBEY ROAD INSTITUTE AMS</text>

  <!-- ================= SHELL ================= -->
  <g stroke="#9FC9E8" fill="none">
    <!-- walls, double line, L01-L04 -->
    <path d="M300 600V240" stroke-width="2" pathLength="100" class="dr s5"/>
    <path d="M307 600V245" stroke-width="1" opacity="0.7" pathLength="100" class="dr s5"/>
    <path d="M880 600V240" stroke-width="2" pathLength="100" class="dr s5"/>
    <path d="M873 600V245" stroke-width="1" opacity="0.7" pathLength="100" class="dr s5"/>
    <!-- slabs -->
    <g stroke-width="1.6" pathLength="100">
      <line x1="300" y1="510" x2="880" y2="510" class="dr s5"/>
      <line x1="300" y1="420" x2="880" y2="420" class="dr s6"/>
      <line x1="300" y1="330" x2="880" y2="330" class="dr s6"/>
      <line x1="300" y1="240" x2="880" y2="240" stroke-width="2" class="dr s7"/>
    </g>
    <g stroke-width="0.8" opacity="0.7" pathLength="100">
      <line x1="307" y1="516" x2="873" y2="516" class="dr s5"/>
      <line x1="307" y1="426" x2="873" y2="426" class="dr s6"/>
      <line x1="307" y1="336" x2="873" y2="336" class="dr s6"/>
    </g>
  </g>

  <!-- ================= LEVEL MARKERS ================= -->
  <g class="t s7">
    <g stroke="#7FA8C7" stroke-width="1.2" fill="none">
      <circle cx="282" cy="600" r="6"/><line x1="270" y1="600" x2="300" y2="600"/>
      <circle cx="282" cy="510" r="6"/><line x1="270" y1="510" x2="300" y2="510"/>
      <circle cx="282" cy="420" r="6"/><line x1="270" y1="420" x2="300" y2="420"/>
      <circle cx="282" cy="330" r="6"/><line x1="270" y1="330" x2="300" y2="330"/>
      <circle cx="282" cy="240" r="6"/><line x1="270" y1="240" x2="300" y2="240"/>
    </g>
    <g font-size="11" fill="#7FA8C7" text-anchor="end">
      <text x="262" y="594">&#177;0.00</text>
      <text x="262" y="504">+3.60</text>
      <text x="262" y="414">+7.20</text>
      <text x="262" y="324">+10.80</text>
      <text x="262" y="234">+14.40</text>
    </g>
  </g>

  <!-- ================= FLOORS : CONTENT ================= -->
  <!-- L01 -->
  <g class="t s6">
    <text x="326" y="534" font-size="10" letter-spacing="3" fill="#7FA8C7">LEVEL 01</text>
    <text x="326" y="560" font-size="20" font-weight="700" letter-spacing="2" fill="#EAF4FB">HARMONIC CONSERVATORY</text>
    <text x="856" y="560" font-size="11" letter-spacing="1" fill="#7FA8C7" text-anchor="end">IN SERVICE</text>
    <text x="326" y="584" font-size="13" letter-spacing="0.5" fill="#9FC9E8">GAMIFIED MUSIC-EDUCATION SAAS &#183; VANILLA JS &#183; WEB AUDIO API</text>
  </g>
  <!-- L02 -->
  <g class="t s7">
    <text x="326" y="444" font-size="10" letter-spacing="3" fill="#7FA8C7">LEVEL 02</text>
    <text x="326" y="470" font-size="20" font-weight="700" letter-spacing="2" fill="#EAF4FB">CHORD ARCHITECT</text>
    <text x="856" y="470" font-size="11" letter-spacing="1" fill="#7FA8C7" text-anchor="end">TOPPED OUT</text>
    <text x="326" y="494" font-size="13" letter-spacing="0.5" fill="#9FC9E8">JUCE VST3/AU PLUG-IN &#183; MULTI-TRACK MIDI EXPORT ENGINE</text>
  </g>
  <!-- L03 -->
  <g class="t s8">
    <text x="326" y="354" font-size="10" letter-spacing="3" fill="#7FA8C7">LEVEL 03</text>
    <text x="326" y="380" font-size="20" font-weight="700" letter-spacing="2" fill="#EAF4FB">OPERATION NEXUS</text>
    <text x="856" y="380" font-size="11" letter-spacing="1" fill="#7FA8C7" text-anchor="end">DELIVERED 2026</text>
    <text x="326" y="404" font-size="13" letter-spacing="0.5" fill="#9FC9E8">CRISIS-SIMULATION WEB APP &#183; NEXT.JS &#183; VERCEL &#183; NEON</text>
  </g>
  <!-- L04 -->
  <g class="t s8">
    <text x="326" y="264" font-size="10" letter-spacing="3" fill="#7FA8C7">LEVEL 04</text>
    <text x="326" y="290" font-size="20" font-weight="700" letter-spacing="2" fill="#EAF4FB">SCORE ANALYSER</text>
    <text x="856" y="290" font-size="11" letter-spacing="1" fill="#7FA8C7" text-anchor="end">COMMISSIONED</text>
    <text x="326" y="314" font-size="13" letter-spacing="0.5" fill="#9FC9E8">MIR PIPELINE &#183; VITERBI CHORD SEGMENTATION &#183; 81.85% ON POP909</text>
  </g>

  <!-- ================= L05 : UNDER CONSTRUCTION ================= -->
  <g class="t s9">
    <path d="M300 240V150H880V240" fill="none" stroke="#EF6351" stroke-width="1.6" stroke-dasharray="9 7"/>
    <text x="326" y="176" font-size="10" letter-spacing="3" fill="#EF6351">LEVEL 05: UNDER CONSTRUCTION</text>
    <text x="326" y="202" font-size="15" font-weight="700" letter-spacing="1.5" fill="#EF6351">BACKEND &#183; AUTH &#183; PAYMENTS &#183; ISC2 CC</text>
    <text x="326" y="226" font-size="11" letter-spacing="1" fill="#EF6351" opacity="0.85">EU AI ACT EXPLAINER SERIES &#183; HARD HATS REQUIRED</text>
  </g>

  <!-- ================= TOWER CRANE ================= -->
  <g stroke="#EF6351" fill="none" class="t s10">
    <!-- base + mast -->
    <line x1="956" y1="600" x2="1000" y2="600" stroke-width="2.4"/>
    <line x1="966" y1="600" x2="966" y2="140" stroke-width="1.8"/>
    <line x1="990" y1="600" x2="990" y2="140" stroke-width="1.8"/>
    <path d="M966 560l24-40-24-40 24-40-24-40 24-40-24-40 24-40-24-40 24-40-24-40 24-40" stroke-width="1"/>
    <!-- apex -->
    <path d="M966 140L978 108L990 140" stroke-width="1.6"/>
    <!-- jib + counter-jib -->
    <line x1="700" y1="140" x2="1090" y2="140" stroke-width="1.8"/>
    <path d="M978 108L742 140M978 108L1064 140" stroke-width="1"/>
    <!-- counterweight -->
    <rect x="1058" y="142" width="32" height="22" stroke-width="1.6"/>
    <!-- trolley + hoist + load -->
    <rect x="798" y="140" width="16" height="8" stroke-width="1.4"/>
    <line x1="806" y1="148" x2="806" y2="186" stroke-width="1.2"/>
    <path d="M806 186q-6 8 2 10" stroke-width="1.4"/>
    <rect x="782" y="196" width="48" height="24" stroke-width="1.6"/>
  </g>
  <text x="1006" y="380" font-size="11" letter-spacing="2" fill="#EF6351" transform="rotate(-90 1006 380)" text-anchor="middle" class="t s10">CRANE: DO NOT IDLE</text>

  <!-- ================= OVERALL DIM ================= -->
  <g stroke="#7FA8C7" stroke-width="1" opacity="0.9">
    <line x1="252" y1="150" x2="168" y2="150" pathLength="100" class="dr s8"/>
    <line x1="252" y1="600" x2="168" y2="600" pathLength="100" class="dr s8"/>
    <line x1="176" y1="150" x2="176" y2="600" pathLength="100" class="dr s8"/>
    <path d="M171 155l10-10M171 605l10-10" pathLength="100" class="dr s9"/>
  </g>
  <text x="160" y="375" font-size="11" letter-spacing="2" fill="#7FA8C7" transform="rotate(-90 160 375)" text-anchor="middle" class="t s9">RISE TO DATE: ONGOING</text>

  <!-- notes -->
  <text x="64" y="742" font-size="12" letter-spacing="1" fill="#7FA8C7" class="t s10">GENERAL NOTES: 1. ALL LEVELS LOAD-BEARING.&#160;&#160;2. NO FLOOR IS FINAL.&#160;&#160;3. DRAWINGS NOT TO SCALE; AMBITION IS.</text>
</svg>
